name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: GarethCott
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Johannesburg

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact

          plugin_lines: yes
          plugin_topics: yes
          plugin_topics_mode: icons

          # The plugins below need a personal access token with the `repo` scope
          # saved as a secret called METRICS_TOKEN. Uncomment once added:
          # plugin_habits: yes
          # plugin_habits_facts: yes
          # plugin_habits_charts: yes
          # plugin_followup: yes
